<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCFC — 3D Card Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="phone.css">
  <style>
    /* ---- View Switcher ---- */
    .view-nav {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      background: rgba(30, 27, 27, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(186, 161, 79, 0.1);
      border-radius: 8px;
      padding: 3px;
      z-index: 10000;
      font-family: 'Inter', sans-serif;
    }
    .view-nav__btn {
      padding: 6px 20px;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(245, 240, 237, 0.4);
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-nav__btn--active {
      color: #F5F0ED;
      background: rgba(186, 161, 79, 0.15);
    }
    .view-nav__btn:hover:not(.view-nav__btn--active) {
      color: rgba(245, 240, 237, 0.7);
    }

    /* ---- Views ---- */
    .view { display: none; }
    .view--active { display: flex; }

    .view--card {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .view--phone {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* Override body styles for unified page */
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      min-height: 100vh;
      background: #242020;
      background-image:
        radial-gradient(ellipse 60% 50% at 75% 15%, rgba(140, 120, 60, 0.15) 0%, transparent 100%),
        radial-gradient(ellipse 50% 60% at 90% 55%, rgba(120, 100, 70, 0.1) 0%, transparent 100%),
        radial-gradient(ellipse 55% 45% at 15% 75%, rgba(50, 85, 88, 0.15) 0%, transparent 100%),
        radial-gradient(ellipse 60% 35% at 45% 90%, rgba(40, 65, 68, 0.12) 0%, transparent 100%),
        radial-gradient(ellipse 50% 50% at 50% 45%, rgba(70, 20, 18, 0.22) 0%, transparent 100%),
        radial-gradient(ellipse 45% 40% at 85% 80%, rgba(105, 80, 55, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 40% 45% at 10% 35%, rgba(55, 60, 38, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 50% 35% at 25% 20%, rgba(120, 100, 60, 0.08) 0%, transparent 100%);
      font-family: 'Inter', -apple-system, sans-serif;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: soft-light;
    }

    /* Hide phone.css body styles since we use inline */
    .view--phone .phone { margin: 0; }

    /* Mobile: hide nav, show phone view fullscreen */
    @media (max-width: 500px) {
      .view-nav { display: none; }
      .view--card { display: none !important; }
      .view--phone { display: flex !important; }
      .view--phone {
        perspective: none;
      }
      .phone {
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        border: none !important;
        transform: none !important;
      }
      .dark-zone { border-radius: 0 !important; }
    }
  </style>
</head>
<body>

  <!-- View Switcher -->
  <nav class="view-nav" id="viewNav">
    <button class="view-nav__btn view-nav__btn--active" data-view="card">Card</button>
    <button class="view-nav__btn" data-view="phone">In App</button>
  </nav>

  <!-- Card View -->
  <div class="view view--card view--active" id="view-card">
    <div class="scene">
      <div class="card-container">
        <div class="card" id="card-standalone">
          <div class="card__border"></div>
          <div class="card__body">
            <div class="card__pattern"></div>
          </div>
          <div class="card__shine"></div>
          <div class="card__edge-shine"></div>
          <div class="card__glare"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Phone View -->
  <div class="view view--phone" id="view-phone">
    <div class="phone">
      <div class="dark-zone">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <div class="status-bar__right">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="0.5" fill="#F5F0ED"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5F0ED"/><rect x="9" y="0.5" width="3" height="11.5" rx="0.5" fill="#F5F0ED"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5F0ED" opacity="0.3"/></svg>
            <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><path d="M7.5 3.5C9.4 3.5 11.1 4.3 12.3 5.5L13.8 4C12.2 2.4 10 1.5 7.5 1.5C5 1.5 2.8 2.4 1.2 4L2.7 5.5C3.9 4.3 5.6 3.5 7.5 3.5Z" fill="#F5F0ED"/><path d="M7.5 6.5C8.6 6.5 9.6 6.9 10.4 7.6L11.8 6.1C10.7 5.1 9.2 4.5 7.5 4.5C5.8 4.5 4.3 5.1 3.2 6.1L4.6 7.6C5.4 6.9 6.4 6.5 7.5 6.5Z" fill="#F5F0ED"/><circle cx="7.5" cy="10" r="1.5" fill="#F5F0ED"/></svg>
            <div class="status-bar__battery status-bar__battery--light"><div class="status-bar__battery-fill status-bar__battery-fill--light"></div></div>
          </div>
        </div>
        <div class="page-title">Debit Cards</div>
        <div class="card-section">
          <div class="card-container">
            <div class="card" id="card-phone">
              <div class="card__body">
                <div class="card__pattern"></div>
              </div>
              <div class="card__border"></div>
              <div class="card__shine"></div>
              <div class="card__edge-shine"></div>
              <div class="card__glare"></div>
            </div>
          </div>
        </div>
        <div class="card-dots">
          <span class="card-dot card-dot--active"></span>
          <span class="card-dot"></span>
          <span class="card-dot"></span>
        </div>
        <div class="balance">
          <span class="balance__label">Available balance</span>
          <span class="balance__amount">€ 28 215<span class="balance__cents">.49</span></span>
        </div>
      </div>
      <div class="light-zone">
        <div class="transactions">
          <span class="transactions__title">Card actions</span>
          <div class="action-row">
            <div class="action-row__info">
              <span class="action-row__name">Freeze card</span>
              <span class="action-row__desc">Protect your card</span>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b0a8a8" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
          </div>
          <div class="action-row">
            <div class="action-row__info">
              <span class="action-row__name">View pin</span>
              <span class="action-row__desc">Always protect your PIN</span>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b0a8a8" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
          </div>
          <div class="action-row">
            <div class="action-row__info">
              <span class="action-row__name">Report lost or stolen</span>
              <span class="action-row__desc">We will terminate the card</span>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b0a8a8" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>
        <div class="transactions" style="margin-top: 8px;">
          <span class="transactions__title">Transactions</span>
          <div class="transaction">
            <div class="transaction__dot"></div>
            <div class="transaction__info">
              <span class="transaction__name">Private Jet Charter</span>
              <span class="transaction__date">Today</span>
            </div>
            <span class="transaction__amount transaction__amount--debit">-€84,500</span>
          </div>
          <div class="transaction">
            <div class="transaction__dot transaction__dot--credit"></div>
            <div class="transaction__info">
              <span class="transaction__name">Wire Transfer</span>
              <span class="transaction__date">Yesterday</span>
            </div>
            <span class="transaction__amount transaction__amount--credit">+€320,000</span>
          </div>
        </div>
      </div>
      <div class="nav">
        <div class="nav__item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Accounts</span></div>
        <div class="nav__item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12H3"/><path d="M16 7l5 5-5 5"/><path d="M8 17l-5-5 5-5"/></svg><span>Payments</span></div>
        <div class="nav__item nav__item--active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg><span>Cards</span></div>
        <div class="nav__item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5"/></svg><span>Services</span></div>
        <div class="nav__item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg><span>Support</span></div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>

  <script src="script-unified.js"></script>
</body>
</html>
